<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Confirmed - Main Line Bounce</title>
<link rel="stylesheet" href="css/style.css">
<style>
.success-wrap{max-width:600px;margin:80px auto;padding:50px 30px;text-align:center;background:#fff;border-radius:20px;box-shadow:0 8px 30px rgba(0,0,0,.1)}
.success-icon{font-size:80px;margin-bottom:20px}
.success-wrap h1{color:#e91e8c;margin-bottom:12px}
.success-wrap p{color:#666;font-size:17px;line-height:1.6}
.btn-home{display:inline-block;margin-top:30px;background:#e91e8c;color:#fff;padding:14px 40px;border-radius:50px;text-decoration:none;font-weight:700;transition:.2s}
.btn-home:hover{background:#c4157a}
</style>
</head>
<body>

<header class="site-header">
  <a href="index.html" class="logo">Main Line Bounce</a>
</header>

<div class="success-wrap">
  <div class="success-icon">🎉 </div>
  <h1>Payment Successful!</h1>
<p>
    Thank you for your booking! Your payment has been received and your
    reservation is confirmed.<br><br>
    We'll contact you shortly with all the details. Get ready to bounce! 🦘
  </p>
  <a href="index.html" class="btn-home">Back to Home</a>
</div>

<script>
  // Vide le panier après paiement réussi
  localStorage.removeItem("mlb_cart");
  localStorage.removeItem("mlb_pending_booking");
</script>

</body>
</html>
