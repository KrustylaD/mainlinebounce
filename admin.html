<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Gestion des dates</title>

  <!-- ✅ Thème du site -->
  <link rel="stylesheet" href="css/style.css">

  <style>
  /* ===== ADMIN — aligné sur le thème Main Line Bounce ===== */
  .admin-wrap{
    max-width: 600px;
    margin: 48px auto 80px;
    padding: 0 28px;
  }

  .admin-wrap h1{
    text-align: center;
    font-size: 1.9rem;
    font-weight: 800;
    color: var(--color-dark);
    margin-bottom: 28px;
  }

  .box{
    background: var(--color-white);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    padding: 32px 30px;
    margin-bottom: 24px;
  }

  .box h3{
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--color-dark);
    margin-bottom: 14px;
  }

  label{
    display: block;
    margin: 14px 0 6px;
    font-weight: 600;
    font-size: 0.93rem;
    color: var(--color-dark);
  }

  input[type="password"],
  input[type="date"],
  select{
    width: 100%;
    padding: 12px 14px;
    border: 2px solid var(--color-pink-pale);
    border-radius: 12px;
    font-size: 0.95rem;
    font-family: 'Poppins', sans-serif;
    color: var(--color-dark);
    background: var(--color-white);
    box-sizing: border-box;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  input[type="password"]:focus,
  input[type="date"]:focus,
  select:focus{
    outline: none;
    border-color: var(--color-pink);
    box-shadow: 0 0 0 3px rgba(245,106,155,0.15);
  }

  .block-btn,
  .unblock-btn{
    width: 100%;
    margin-top: 16px;
    padding: 14px 32px;
    border: none;
    border-radius: var(--radius-pill);
    font-family: 'Poppins', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
  }
  .block-btn:hover,
  .unblock-btn:hover{ transform: translateY(-2px); }

  .block-btn{
    background: var(--color-pink);
    box-shadow: 0 6px 20px rgba(245,106,155,0.35);
  }
  .block-btn:hover{
    background: var(--color-pink-hover);
    box-shadow: 0 8px 24px rgba(245,106,155,0.45);
  }

  .unblock-btn{
    background: var(--color-orange);
    box-shadow: 0 6px 20px rgba(245,148,74,0.35);
  }
  .unblock-btn:hover{
    background: var(--color-orange-hover);
    box-shadow: 0 8px 24px rgba(245,148,74,0.45);
  }

  #status{
    text-align: center;
    margin-top: 16px;
    font-weight: 700;
    font-size: 0.9rem;
    min-height: 20px;
  }

  .list{ font-size: 0.92rem; color: var(--color-dark); }
  .list h4{
    margin: 16px 0 6px;
    font-size: 0.95rem;
    color: var(--color-dark);
  }
  .list ul{ margin: 4px 0; padding-left: 0; }
  .list li{
    list-style: none;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--color-pink-pale);
    color: var(--color-pink);
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 10px;
    margin: 8px 0;
  }
  .list li::before{ content: "📅"; }

  @media (max-width: 600px){
    .admin-wrap{ padding: 0 18px; margin: 32px auto 60px; }
    .box{ padding: 26px 22px; }
    .admin-wrap h1{ font-size: 1.6rem; }
  }
  </style>
</head>
<body>

  <div class="admin-wrap">
    <h1>🔐 Gestion des dates bloquées</h1>

    <div class="box">
      <label>Clé admin</label>
      <input type="password" id="adminKey" placeholder="Ta clé secrète">

      <label>Inflatable concerné</label>
      <select id="item">
        <option value="ALL">🌐 TOUS les inflatables (blocage global)</option>
        <option value="big-fun-xl">Big Fun XL</option>
        <option value="dolphin-slide">Dolphin Slide</option>
        <option value="magic-castle">Magic Castle</option>
        <option value="slip-and-slide">Slip and Slide</option>
        <option value="superhero-combo">SuperHero Combo</option>
        <option value="tropical-paradise">Tropical Paradise</option>
      </select>

      <label>Date à bloquer / débloquer</label>
      <input type="date" id="date">

      <button class="block-btn" onclick="sendAction('block')">🚫 Bloquer cette date</button>
      <button class="unblock-btn" onclick="sendAction('unblock')">✅ Débloquer cette date</button>

      <div id="status"></div>
    </div>

    <div class="box">
      <h3>📅 Dates actuellement bloquées</h3>
      <div class="list" id="blockedList">Chargement...</div>
    </div>
  </div>

  <script>
    const API = "/.netlify/functions/blocked-dates";

    // Noms lisibles pour l'affichage
    const ITEM_NAMES = {
      "ALL": "🌐 Tous les inflatables",
      "big-fun-xl": "Big Fun XL",
      "dolphin-slide": "Dolphin Slide",
      "magic-castle": "Magic Castle",
      "slip-and-slide": "Slip and Slide",
      "superhero-combo": "SuperHero Combo",
      "tropical-paradise": "Tropical Paradise"
    };

    async function sendAction(action) {
      const status = document.getElementById("status");
      const adminKey = document.getElementById("adminKey").value.trim();
      const date = document.getElementById("date").value;
      const item = document.getElementById("item").value;

      if (!adminKey) { status.textContent = "❌ Entre ta clé admin"; status.style.color = "#e63329"; return; }
      if (!item)     { status.textContent = "❌ Choisis un inflatable"; status.style.color = "#e63329"; return; }
      if (!date)     { status.textContent = "❌ Choisis une date"; status.style.color = "#e63329"; return; }

      status.textContent = "⏳ En cours...";
      status.style.color = "var(--color-gray)";

      try {
        const res = await fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-admin-key": adminKey },
          body: JSON.stringify({ item: item, date: date, action: action })
        });

        if (res.status === 401) {
          status.textContent = "❌ Clé admin incorrecte";
          status.style.color = "#e63329";
          return;
        }

        if (res.ok) {
          const label = ITEM_NAMES[item] || item;
          status.textContent = action === "block"
            ? `✅ Date bloquée (${label}) : ${date}`
            : `✅ Date débloquée (${label}) : ${date}`;
          status.style.color = "#27ae60";
          loadBlocked();
        } else {
          status.textContent = "❌ Erreur serveur";
          status.style.color = "#e63329";
        }
      } catch (e) {
        status.textContent = "❌ Erreur réseau";
        status.style.color = "#e63329";
      }
    }

    async function loadBlocked() {
      const list = document.getElementById("blockedList");
      try {
        const res = await fetch(API);
        const data = await res.json();

        const keys = Object.keys(data).filter(k => (data[k] || []).length > 0);
        if (keys.length === 0) {
          list.textContent = "Aucune date bloquée.";
          return;
        }

        let html = "";
        // On affiche ALL en premier s'il existe
        const ordered = keys.sort((a, b) => (a === "ALL" ? -1 : b === "ALL" ? 1 : a.localeCompare(b)));

        for (const key of ordered) {
          const dates = (data[key] || []).sort();
          if (dates.length === 0) continue;
          const label = ITEM_NAMES[key] || key;
          html += `<h4>${label}</h4><ul>`;
          for (const d of dates) html += `<li>${d}</li>`;
          html += "</ul>";
        }
        list.innerHTML = html;
      } catch (e) {
        list.textContent = "Erreur de chargement.";
      }
    }

    loadBlocked();
  </script>
</body>
</html>
