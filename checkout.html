<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Main Line Bounce</title>
<link rel="stylesheet" href="css/style.css">

<!-- ✅ STRIPE.JS -->
<script src="https://js.stripe.com/v3/"></script>

<style>
.checkout-wrap{max-width:1000px;margin:40px auto;padding:0 20px;display:grid;grid-template-columns:1fr 380px;gap:30px}
@media(max-width:768px){.checkout-wrap{grid-template-columns:1fr}}
.checkout-form,.order-summary{background:#fff;border-radius:16px;padding:28px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.checkout-form h2,.order-summary h2{margin-top:0;color:#e91e8c}
.field{margin-bottom:18px}
.field label{display:block;font-weight:600;margin-bottom:6px;color:#444}
.field label .req{color:#e91e8c}
.field input,.field textarea,.field select{width:100%;padding:12px;border:2px solid #f3d4e6;border-radius:10px;font-size:15px;box-sizing:border-box;font-family:inherit}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:#e91e8c}
.field textarea{resize:vertical;min-height:80px}
.summary-item{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f3d4e6}
.summary-item .name{font-weight:600}
.summary-total{display:flex;justify-content:space-between;padding:16px 0 0;font-size:20px;font-weight:700;color:#e91e8c}
.btn-submit{width:100%;background:#e91e8c;color:#fff;border:none;padding:16px;border-radius:50px;font-size:18px;font-weight:700;cursor:pointer;margin-top:20px;transition:.2s}
.btn-submit:hover:not(:disabled){background:#c4157a}
.btn-submit:disabled{opacity:0.6;cursor:not-allowed}
.empty-cart{text-align:center;padding:40px;color:#999}

/* ✅ NOUVEAU : Choix du mode de paiement */
.payment-methods{margin:24px 0}
.payment-methods h3{color:#e91e8c;margin-bottom:12px;font-size:18px}
.payment-option{display:flex;align-items:center;gap:12px;padding:16px;border:2px solid #f3d4e6;border-radius:12px;cursor:pointer;margin-bottom:12px;transition:.2s}
.payment-option:hover{border-color:#e91e8c;background:#fdf2f8}
.payment-option.selected{border-color:#e91e8c;background:#fdf2f8;box-shadow:0 0 0 1px #e91e8c}
.payment-option input[type="radio"]{width:auto;margin:0;accent-color:#e91e8c}
.payment-option .pm-icon{font-size:24px}
.payment-option .pm-text{flex:1}
.payment-option .pm-title{font-weight:700;color:#333}
.payment-option .pm-desc{font-size:13px;color:#888}
</style>
</head>
<body>

<header class="site-header">
  <a href="index.html" class="logo">Main Line Bounce</a>
  <a href="inflatables.html" class="btn-booknow">Book now</a>
</header>

<div class="checkout-wrap">

  <!-- FORM -->
  <div class="checkout-form">
    <h2>Booking Details</h2>
    <form id="checkoutForm">
      <div class="field">
        <label>Name <span class="req">*</span></label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="field">
        <label>Email <span class="req">*</span></label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="field">
        <label>Address <span class="req">*</span></label>
        <input type="text" id="address" name="address" required>
      </div>
      <div class="field">
        <label>Phone number</label>
        <input type="tel" id="phone" name="phone">
      </div>
      <div class="field">
        <label>Which date is your event ?</label>
        <input type="date" id="date" name="date">
      </div>
      <div class="field">
        <label>Where is your event ?</label>
        <select id="where" name="where">
          <option value="">-- Select --</option>
          <option value="Backyard / Grass">Backyard / Grass</option>
          <option value="Backyard / hard surface">Backyard / hard surface</option>
          <option value="Residencial / Street">Residencial / Street</option>
          <option value="Public Indoor ( Church, school...)">Public Indoor ( Church, school...)</option>
          <option value="Public outdoor ( Church, school...)">Public outdoor ( Church, school...)</option>
        </select>
      </div>
      <div class="field">
        <label>How many guest ? <span class="req">*</span></label>
        <input type="number" id="guests" name="guests" required>
      </div>
      <div class="field">
        <label>Comments</label>
        <textarea id="comments" name="comments"></textarea>
      </div>

      <!-- ✅ NOUVEAU : CHOIX DU PAIEMENT -->
      <div class="payment-methods">
        <h3>Payment Method</h3>

        <label class="payment-option selected" id="optionCard">
          <input type="radio" name="paymentMethod" value="card" checked>
          <span class="pm-icon">💳</span>
          <span class="pm-text">
            <span class="pm-title">Pay with Card</span>
            <span class="pm-desc">Secure online payment via Stripe</span>
          </span>
        </label>

        <label class="payment-option" id="optionSite">
          <input type="radio" name="paymentMethod" value="site">
          <span class="pm-icon">🏠</span>
          <span class="pm-text">
            <span class="pm-title">Pay on Site</span>
            <span class="pm-desc">Pay cash on the day of your event</span>
          </span>
        </label>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">Confirm Booking</button>
    </form>
  </div>

  <!-- SUMMARY -->
  <div class="order-summary">
    <h2>Your Order</h2>
    <div id="summaryItems"></div>
    <div class="summary-total">
      <span>Total</span>
      <span id="summaryTotal">$0</span>
    </div>
  </div>

</div>

<!-- ✅ CHECKOUT JS -->
<script src="js/checkout.js"></script>
<script src="js/main.js"></script>

</body>
</html>
